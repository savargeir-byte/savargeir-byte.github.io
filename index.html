<!DOCTYPE html>
<html lang="is">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aurora Vision - Developer Site</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a0f1e 0%, #1a2332 100%);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            text-align: center;
            max-width: 600px;
        }
        h1 {
            font-size: 2.5em;
            margin-bottom: 0.5em;
            color: #00ff88;
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
        }
        p {
            font-size: 1.2em;
            line-height: 1.6;
            color: #b0c4de;
        }
        .emoji {
            font-size: 4em;
            margin-bottom: 0.5em;
        }
        .links {
            margin-top: 2em;
        }
        a {
            color: #00ff88;
            text-decoration: none;
            padding: 10px 20px;
            border: 2px solid #00ff88;
            border-radius: 5px;
            margin: 0 10px;
            display: inline-block;
            transition: all 0.3s;
        }
        a:hover {
            background: #00ff88;
            color: #0a0f1e;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="emoji">✨</div>
        <h1>Aurora Vision</h1>
        <p>Norðurljósaspá fyrir Ísland</p>
        <p>Northern Lights Forecast for Iceland</p>
        <div class="links">
            <a href="https://apps.apple.com/app/aurora-vision/id123456789" target="_blank">App Store</a>
            <a href="https://play.google.com/store/apps/details?id=com.iceveflausnir.auroravision" target="_blank">Google Play</a>
        </div>
    </div>
</body>
</html>
